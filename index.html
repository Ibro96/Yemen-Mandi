<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yemen Mandi — To-Do</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <h1>To-Do List</h1>

    <form id="todo-form" aria-label="Add a new to-do">
      <input id="todo-input" type="text" placeholder="What needs to be done?" autocomplete="off" required />
      <button type="submit">Add</button>
    </form>

    <ul id="todo-list" aria-live="polite"></ul>

    <div class="controls">
      <button id="filter-all" class="filter active">All</button>
      <button id="filter-active" class="filter">Active</button>
      <button id="filter-completed" class="filter">Completed</button>
      <button id="clear-completed">Clear completed</button>
      <button id="clear-all">Clear all</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
